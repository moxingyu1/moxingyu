<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="subscriptionGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007acc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00aaff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Subscription/Recurring icon -->
  <rect x="25" y="30" width="50" height="40" rx="5" fill="none" stroke="url(#subscriptionGrad)" stroke-width="3"/>
  
  <path d="M 35 50 L 45 60 L 65 40" fill="none" stroke="url(#subscriptionGrad)" stroke-width="3"/>
  
  <!-- Circular arrow for recurring -->
  <path d="M 75 35 A 15 15 0 0 1 75 65" fill="none" stroke="url(#subscriptionGrad)" stroke-width="2" stroke-dasharray="5,3"/>
  <polygon points="75,30 72,38 78,38" fill="url(#subscriptionGrad)"/>
</svg>