<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="globalGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#007acc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00aaff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Globe -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="url(#globalGrad)" stroke-width="3"/>
  <ellipse cx="50" cy="50" rx="35" ry="15" fill="none" stroke="url(#globalGrad)" stroke-width="2"/>
  <ellipse cx="50" cy="50" rx="35" ry="15" fill="none" stroke="url(#globalGrad)" stroke-width="2" transform="rotate(90, 50, 50)"/>
  <ellipse cx="50" cy="50" rx="35" ry="15" fill="none" stroke="url(#globalGrad)" stroke-width="2" transform="rotate(45, 50, 50)"/>
  <circle cx="50" cy="50" r="8" fill="url(#globalGrad)" opacity="0.3"/>
</svg>