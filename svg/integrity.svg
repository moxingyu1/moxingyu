  <line x1="30" y1="25" x2="70" y2="25" stroke="url(#integrityGrad)" stroke-width="3"/>
  
  <circle cx="30" cy="35" r="10" fill="none" stroke="url(#integrityGrad)" stroke-width="2"/>
  <circle cx="70" cy="35" r="10" fill="none" stroke="url(#integrityGrad)" stroke-width="2"/>
  
  <rect x="45" y="80" width="10" height="5" fill="url(#integrityGrad)"/>
