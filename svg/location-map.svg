<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400">
  <defs>
    <linearGradient id="mapGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0f8ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e6f4ff;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="800" height="400" fill="url(#mapGrad)"/>
  
  <!-- Simplified Beijing map representation -->
  <path d="M 100 200 Q 200 150 300 180 T 500 200 T 700 180" fill="none" stroke="#007acc" stroke-width="2" opacity="0.3"/>
  <path d="M 150 100 Q 200 200 250 300" fill="none" stroke="#007acc" stroke-width="2" opacity="0.3"/>
  <path d="M 350 80 Q 400 200 450 320" fill="none" stroke="#007acc" stroke-width="2" opacity="0.3"/>
  <path d="M 550 90 Q 600 200 650 310" fill="none" stroke="#007acc" stroke-width="2" opacity="0.3"/>
  
  <!-- Grid lines -->
  <line x1="0" y1="100" x2="800" y2="100" stroke="#007acc" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="200" x2="800" y2="200" stroke="#007acc" stroke-width="1" opacity="0.1"/>
  <line x1="0" y1="300" x2="800" y2="300" stroke="#007acc" stroke-width="1" opacity="0.1"/>
  <line x1="200" y1="0" x2="200" y2="400" stroke="#007acc" stroke-width="1" opacity="0.1"/>
  <line x1="400" y1="0" x2="400" y2="400" stroke="#007acc" stroke-width="1" opacity="0.1"/>
  <line x1="600" y1="0" x2="600" y2="400" stroke="#007acc" stroke-width="1" opacity="0.1"/>
  
  <!-- Location marker for Shunyi District -->
  <circle cx="600" cy="150" r="15" fill="#007acc" opacity="0.3"/>
  <circle cx="600" cy="150" r="10" fill="#007acc" opacity="0.5"/>
  <circle cx="600" cy="150" r="5" fill="#007acc"/>
  
  <!-- Ring roads representation -->
  <circle cx="400" cy="200" r="80" fill="none" stroke="#007acc" stroke-width="2" opacity="0.2"/>
  <circle cx="400" cy="200" r="120" fill="none" stroke="#007acc" stroke-width="2" opacity="0.15"/>
  <circle cx="400" cy="200" r="160" fill="none" stroke="#007acc" stroke-width="2" opacity="0.1"/>
  
  <!-- Text labels -->
  <text x="600" y="180" font-family="Arial" font-size="14" fill="#007acc" text-anchor="middle" font-weight="bold">Shunyi District</text>
  <text x="400" y="210" font-family="Arial" font-size="12" fill="#007acc" text-anchor="middle" opacity="0.6">Beijing</text>
  
  <!-- Airport symbol -->
  <path d="M 650 120 L 680 130 L 650 140 Z" fill="#007acc" opacity="0.5"/>
  <text x="690" y="135" font-family="Arial" font-size="10" fill="#007acc">Airport</text>
</svg>